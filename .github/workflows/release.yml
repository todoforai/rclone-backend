name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Create build entry point
        run: |
          cat > main.go << 'GOEOF'
          package main

          import (
            _ "github.com/rclone/rclone/backend/all"
            _ "github.com/todoforai/rclone-backend/backend/todoforai"
            "github.com/rclone/rclone/cmd"
            _ "github.com/rclone/rclone/cmd/all"
            _ "github.com/rclone/rclone/lib/plugin"
          )

          func main() { cmd.Main() }
          GOEOF
          go mod tidy

      - name: Build
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/rclone/rclone/fs.Version=todoforai-${TAG}"
          EXT=""; [ "$GOOS" = "windows" ] && EXT=".exe"
          go build -ldflags="${LDFLAGS}" -o "rclone${EXT}" .

      - name: Package
        run: |
          EXT=""; [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "rclone-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "rclone${EXT}"
          else
            tar czf "rclone-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz" "rclone${EXT}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: rclone-${{ matrix.goos }}-${{ matrix.goarch }}
          path: rclone-*.*

  # Slim single-backend build baked into the todofor.ai sandbox OCI image.
  # Only the todoforai backend + mount/config/ls commands (~16MB vs ~58MB), and
  # published as a raw binary + .sha256 (not a tarball) so sync-vendor.sh can
  # fetch+verify it the same way it does the bridge binary.
  sandbox:
    strategy:
      matrix:
        include:
          - goarch: amd64
            asset: x64
          - goarch: arm64
            asset: arm64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build slim rclone
        env:
          CGO_ENABLED: '0'
          GOOS: linux
          GOARCH: ${{ matrix.goarch }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          LDFLAGS="-s -w -X github.com/rclone/rclone/fs.Version=todoforai-${TAG}"
          OUT="rclone-sandbox-linux-${{ matrix.asset }}"
          go build -ldflags="${LDFLAGS}" -o "$OUT" ./cmd/rclone-sandbox
          sha256sum "$OUT" | awk '{print $1}' > "$OUT.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: rclone-sandbox-linux-${{ matrix.asset }}
          path: rclone-sandbox-linux-*

  release:
    needs: [build, sandbox]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: rclone-*.*
